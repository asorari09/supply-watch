name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can resolve multi-commit push ranges.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test:run
      - run: pnpm build
      - uses: gitleaks/gitleaks-action@v2

  # Any future token-spending or evaluation job must be manual-only:
  # token-spending-evals:
  #   if: github.event_name == 'workflow_dispatch'
  #   runs-on: ubuntu-latest
